aid: zoho-recruit
name: Zoho Recruit
description: >-
  Zoho Recruit is an end-to-end applicant tracking system (ATS) and recruitment
  CRM for staffing agencies, corporate HR teams, and recruiters, covering job
  posting, candidate sourcing, interview scheduling, and hiring workflows. The
  Zoho Recruit v2 REST API exposes candidates, contacts, clients, jobs,
  interviews, and custom modules for full programmatic recruiting integrations.
  Authentication uses Zoho OAuth 2.0 with domain-specific endpoints (.com, .eu,
  .in, .com.au, .com.cn, .jp).
